name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ueupqkxdqjusfxtjaflq.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_yQZKuKK95O-2iGzNnfrQqg_cUlv2DZV

      - name: Copy static assets to dist
        run: |
          cp app/app.js app/data.js app/sw.js app/manifest.json dist/
          cp -r app/icons dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dist folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
